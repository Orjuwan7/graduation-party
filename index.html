<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة تخرج</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }

        /* الصفحة الأولى: الخلفية الطويلة والظرف */
        #first-screen {
            width: 100%; height: 100vh;
            background-image: url('background1.jpg.jpeg'); /* تأكدي أن هذه هي صورة الحديقة الطويلة */
            background-size: cover; background-position: center;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
        }
        .envelope-container { width: 300px; }
        .envelope-container img { width: 100%; }

        .hidden { display: none; }

        /* الصفحة الثانية */
        #second-screen {
            width: 100%; height: 100vh;
            background-color: #fdf5f5; /* أو يمكنك وضع صورة هنا */
            display: flex; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="first-screen" onclick="goToSecond()">
        <div class="envelope-container">
            <img src="letter.jpg.jpeg" alt="الظرف">
        </div>
    </div>

    <div id="second-screen" class="hidden">
        <h1>هنا ستكون تفاصيل الدعوة</h1>
    </div>

    <script>
        function goToSecond() {
            document.getElementById('first-screen').style.display = 'none';
            document.getElementById('second-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
