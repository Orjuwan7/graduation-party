<section class="welcome-page">

<div class="frame">

<div class="graduate-image">

<h2>
إلى صديقتنا ابتسام العزيزة
</h2>

<p class="text">

لأن لكل إنجازٍ لحظةً تستحق الاحتفاء،
ولكل حلمٍ جميل نهاية تُروى بفخر،
كان لابد أن يكون لك يومٌ يليق بك،
ويحكي رحلة اجتهادك حتى وصلتِ إلى هذه اللحظة.

</p>

<p class="text">

يسرنا دعوتك لمشاركتنا فرحة التخرج،
والاحتفال بهذه المناسبة الجميلة،
فوجودك يضيف للمكان بهجةً،
وللفرح معنىً أجمل.

</p>

<button id="openInvitation">

افتح الدعوة

</button>

</div>

</section>

<script>

document.getElementById("openInvitation").onclick=function(){
