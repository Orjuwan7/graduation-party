<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>دعوة تخرج</title>
</head>
<body>

    <div id="envelope-screen" class="screen">
        <div class="content-wrapper" onclick="openInvitation()">
            <img src="letter.jpg.jpeg" class="main-image">
            <p class="click-text">اضغط هنا</p>
        </div>
    </div>

    <div id="invitation-screen" class="screen hidden">
        <div class="card-content">
            <div class="photo-box">
                <img src="atarr.jpg.jpeg" class="frame-img">
                <img src="girl.jpg.jpeg" class="girl-img">
            </div>
            
            <p class="main-text">إلى صديقتنا ابتسام العزيزة، لأن لكل إنجاز لحظة تستحق الاحتفاء، ولكل حلم جميل نهاية تُروى بفخر... يسرنا دعوتك لحضور حفل تخرجك.</p>
            
            <div class="info-box">
                <p>📅 2026.8.5</p>
                <p>🕗 8:30</p>
                <p>📍 <a href="https://maps.app.goo.gl/Gr2uqvuvrCv31Tbu8?g_st=ic">شاليهات زهرة نيسان</a></p>
            </div>
        </div>
    </div>

    <script>
        function openInvitation() {
            document.getElementById('envelope-screen').style.display = 'none';
            document.getElementById('invitation-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
